name: ARM64 Smoke

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/arm64-smoke.yml"
      - "run_bpftime_arm64_benchmarks.sh"
  workflow_dispatch:
    inputs:
      uprobe_test_iter:
        description: "Inner iterations for uprobe smoke test"
        required: false
        default: "10000"
      ssl_sizes:
        description: "Comma-separated ssl-nginx payload sizes for smoke test"
        required: false
        default: "1kb"

jobs:
  smoke:
    name: ${{ matrix.benchmark }} smoke
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        benchmark:
          - uprobe
          - syscount-nginx
          - ssl-nginx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            binutils-dev \
            build-essential \
            ca-certificates \
            clang \
            cmake \
            curl \
            git \
            libboost-all-dev \
            libelf-dev \
            libncurses-dev \
            libssl-dev \
            libtool \
            libyaml-cpp-dev \
            llvm \
            llvm-dev \
            nginx \
            pkg-config \
            python3 \
            python3-matplotlib \
            python3-numpy \
            systemtap-sdt-dev \
            wrk \
            zlib1g-dev

      - name: Show runner information
        run: |
          uname -a
          uname -m
          lscpu
          llvm-config --version || true
          clang --version

      - name: Run smoke benchmarks
        env:
          BENCHMARK: ${{ matrix.benchmark }}
          UPROBE_TEST_ITER: ${{ github.event.inputs.uprobe_test_iter || '10000' }}
          SSL_SIZES: ${{ github.event.inputs.ssl_sizes || '1kb' }}
        run: |
          extra_args=()
          if [[ "$BENCHMARK" == "uprobe" ]]; then
            extra_args+=(--uprobe-test-iter "$UPROBE_TEST_ITER")
          elif [[ "$BENCHMARK" == "ssl-nginx" ]]; then
            extra_args+=(--ssl-sizes "$SSL_SIZES")
          fi

          ./run_bpftime_arm64_benchmarks.sh \
            --build \
            --mode smoke \
            --only "$BENCHMARK" \
            "${extra_args[@]}" \
            --output-dir "$PWD/benchmark-results-arm64-smoke-$BENCHMARK"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm64-${{ matrix.benchmark }}-smoke-benchmark-results
          path: |
            benchmark-results-arm64-smoke-${{ matrix.benchmark }}.tar.gz
          if-no-files-found: warn
