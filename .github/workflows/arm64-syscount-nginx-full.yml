name: ARM64 Syscount-nginx Full

on:
  workflow_dispatch:

jobs:
  syscount-nginx-full:
    name: syscount-nginx full
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            binutils-dev \
            build-essential \
            ca-certificates \
            clang \
            cmake \
            curl \
            git \
            libboost-all-dev \
            libelf-dev \
            libncurses-dev \
            libssl-dev \
            libtool \
            libyaml-cpp-dev \
            llvm \
            llvm-dev \
            nginx \
            pkg-config \
            python3 \
            python3-matplotlib \
            python3-numpy \
            systemtap-sdt-dev \
            wrk \
            zlib1g-dev

      - name: Show runner information
        run: |
          uname -a
          uname -m
          lscpu
          llvm-config --version || true
          clang --version

      - name: Run syscount-nginx full benchmark
        run: |
          ./run_bpftime_arm64_benchmarks.sh \
            --build \
            --mode full \
            --only syscount-nginx \
            --output-dir "$PWD/benchmark-results-arm64-syscount-nginx-full"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm64-syscount-nginx-full-benchmark-results
          path: |
            benchmark-results-arm64-syscount-nginx-full
            benchmark-results-arm64-syscount-nginx-full.tar.gz
          if-no-files-found: warn
