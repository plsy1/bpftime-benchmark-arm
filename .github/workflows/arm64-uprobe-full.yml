name: ARM64 Uprobe Full

on:
  workflow_dispatch:
    inputs:
      uprobe_iter:
        description: "Outer iterations for uprobe"
        required: false
        default: "10"
      uprobe_test_iter:
        description: "Inner iterations for uprobe"
        required: false
        default: "100000"

jobs:
  uprobe-full:
    name: uprobe full
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            binutils-dev \
            build-essential \
            ca-certificates \
            clang \
            cmake \
            curl \
            git \
            libboost-all-dev \
            libelf-dev \
            libncurses-dev \
            libssl-dev \
            libtool \
            libyaml-cpp-dev \
            llvm \
            llvm-dev \
            nginx \
            pkg-config \
            python3 \
            python3-matplotlib \
            python3-numpy \
            systemtap-sdt-dev \
            wrk \
            zlib1g-dev

      - name: Show runner information
        run: |
          uname -a
          uname -m
          lscpu
          llvm-config --version || true
          clang --version

      - name: Run uprobe full benchmark
        env:
          UPROBE_ITER: ${{ github.event.inputs.uprobe_iter || '10' }}
          UPROBE_TEST_ITER: ${{ github.event.inputs.uprobe_test_iter || '100000' }}
        run: |
          ./run_bpftime_arm64_benchmarks.sh \
            --build \
            --mode full \
            --only uprobe \
            --uprobe-iter "$UPROBE_ITER" \
            --uprobe-test-iter "$UPROBE_TEST_ITER" \
            --output-dir "$PWD/benchmark-results-arm64-uprobe-full"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm64-uprobe-full-benchmark-results
          path: |
            benchmark-results-arm64-uprobe-full.tar.gz
          if-no-files-found: warn
