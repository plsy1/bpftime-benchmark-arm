name: Build Jetson No-BTF Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          repository: plsy1/bpftime-benchmark
          ref: codex/jetson-no-btf-docker
          submodules: recursive
          path: bpftime

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: bpftime
          file: bpftime/Dockerfile.jetson-no-btf
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bpftime:jetson-no-btf-arm64
            ghcr.io/${{ github.repository_owner }}/bpftime:jetson-no-btf-arm64-${{ github.sha }}
