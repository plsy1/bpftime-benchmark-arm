name: X64 Smoke

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/x64-smoke.yml"
      - "run_bpftime_arm64_benchmarks.sh"
  workflow_dispatch:
    inputs:
      uprobe_test_iter:
        description: "Inner iterations for uprobe smoke test"
        required: false
        default: "10000"
      ssl_sizes:
        description: "Comma-separated ssl-nginx payload sizes for smoke test"
        required: false
        default: "1kb"

jobs:
  smoke:
    name: ${{ matrix.benchmark }} smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        benchmark:
          - uprobe
          - syscall
          - syscount-nginx
          - ssl-nginx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner information
        run: |
          uname -a
          uname -m
          lscpu

      - name: Run smoke benchmarks
        env:
          BENCHMARK: ${{ matrix.benchmark }}
          UPROBE_TEST_ITER: ${{ github.event.inputs.uprobe_test_iter || '10000' }}
          SSL_SIZES: ${{ github.event.inputs.ssl_sizes || '1kb' }}
        run: |
          extra_args=()
          if [[ "$BENCHMARK" == "uprobe" ]]; then
            extra_args+=(--uprobe-test-iter "$UPROBE_TEST_ITER")
          elif [[ "$BENCHMARK" == "ssl-nginx" ]]; then
            extra_args+=(--ssl-sizes "$SSL_SIZES")
          fi

          ./run_bpftime_arm64_benchmarks.sh \
            --install-deps \
            --build \
            --mode smoke \
            --only "$BENCHMARK" \
            "${extra_args[@]}" \
            --output-dir "$PWD/benchmark-results-x64-smoke-$BENCHMARK"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x64-${{ matrix.benchmark }}-smoke-benchmark-results
          path: |
            benchmark-results-x64-smoke-${{ matrix.benchmark }}.tar.gz
          if-no-files-found: warn
