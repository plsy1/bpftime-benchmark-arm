name: X64 Syscall Full

on:
  workflow_dispatch:

jobs:
  syscall-full:
    name: syscall full
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner information
        run: |
          uname -a
          uname -m
          lscpu
          llvm-config --version || true
          clang --version || true

      - name: Run syscall full benchmark
        run: |
          ./run_bpftime_arm64_benchmarks.sh \
            --install-deps \
            --build \
            --mode full \
            --only syscall \
            --output-dir "$PWD/benchmark-results-x64-syscall-full"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x64-syscall-full-benchmark-results
          path: |
            benchmark-results-x64-syscall-full.tar.gz
          if-no-files-found: warn
