name: X64 Syscount Smoke

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/x64-syscount-smoke.yml"
      - "run_x64_syscount_smoke.sh"
      - "run_bpftime_arm64_benchmarks.sh"
      - "benchmark/syscount-nginx/**"
      - "example/tracing/syscount/**"
  workflow_dispatch:
    inputs:
      runs:
        description: "Number of syscount smoke runs per group"
        required: false
        default: "2"

jobs:
  x64-syscount-smoke:
    name: x64 syscount smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner information
        run: |
          uname -a
          uname -m
          lscpu
          llvm-config --version || true
          clang --version || true

      - name: Install dependencies and build syscount
        env:
          SYSCOUNT_NGINX_NUM_RUNS: "1"
          SYSCOUNT_NGINX_WRK_DURATION: "1"
          SYSCOUNT_NGINX_DURATION: "2"
          SYSCOUNT_NGINX_TIMEOUT: "6"
        run: |
          ./run_bpftime_arm64_benchmarks.sh \
            --install-deps \
            --build \
            --mode smoke \
            --only syscount-nginx \
            --output-dir "$PWD/benchmark-results-x64-syscount-build-check"

      - name: Run x64 syscount smoke validator
        env:
          SYSCOUNT_NGINX_NUM_RUNS: ${{ github.event.inputs.runs || '2' }}
        run: |
          ./run_x64_syscount_smoke.sh

      - name: Upload syscount smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x64-syscount-smoke-results
          path: |
            benchmark-results-x64-syscount-build-check.tar.gz
            benchmark/syscount-nginx/benchmark_results_*.json
            benchmark/syscount-nginx/reports.md
            benchmark/syscount-nginx/benchmark_chart.png
            benchmark/syscount-nginx/trace_logs/**
          if-no-files-found: warn
